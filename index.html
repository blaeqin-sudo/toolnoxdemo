<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TOOLNOX | Premium Tool Directory</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#141414',
                        'brand-surface': '#1e1e1e',
                        'brand-accent': '#E50914',
                        'brand-glow': 'rgba(229, 9, 20, 0.5)',
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    boxShadow: { 'neon': '0 0 20px rgba(229, 9, 20, 0.3)' }
                }
            }
        }
    </script>

    <!-- App styles loaded from external file -->
    <link rel="stylesheet" href="app.css">
</head>
<body style="background:#141414;margin:0;">

    <!-- Loading screen shown while JS decodes the app -->
    <div id="__shell_loader" style="
        position:fixed;top:0;left:0;width:100vw;height:100vh;
        background:#141414;display:flex;flex-direction:column;
        align-items:center;justify-content:center;z-index:99999;
        font-family:'Plus Jakarta Sans',sans-serif;
    ">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="#E50914" style="margin-bottom:16px;animation:spin 1s linear infinite;">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <p style="color:#666;font-size:14px;letter-spacing:0.2em;text-transform:uppercase;">Loading TOOLNOX...</p>
        <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
    </div>

    <!-- App renders here — nothing useful in source -->
    <div id="__app_root"></div>

    <!-- Load encoded app from external JS file -->
    <script src="app.js"></script>

</body>
</html>
